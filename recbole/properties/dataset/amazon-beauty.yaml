# Amazon Beauty - 序列推荐鲁棒去噪实验配置
# 自动下载源见 url.yaml (amazon-beauty)

field_separator: "\t"
seq_separator: " "

USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp
RATING_FIELD: rating

# Sequential
ITEM_LIST_LENGTH_FIELD: item_length
LIST_SUFFIX: _list
MAX_ITEM_LIST_LENGTH: 50
POSITION_FIELD: position_id

load_col:
    inter: [user_id, item_id, rating, timestamp]

# 过滤：5-core
user_inter_num_interval: "[5,inf)"
item_inter_num_interval: "[5,inf)"

# 评估：序列推荐 leave-one-out + 时间序 + 全排序
eval_args:
    split: {'LS': 'valid_and_test'}
    order: TO
    mode: full
repeatable: True

metrics: ['Recall', 'NDCG', 'TailRecall', 'TailNDCG']
topk: [10, 20]
valid_metric: NDCG@20
tail_ratio: 0.2

# 噪声注入开关（默认 clean）
noise_type: none
noise_ratio: 0.0
noise_seed: 2024
